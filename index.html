<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Everyday · 生日快乐 🎂</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/solarlunar@2.0.7/lib/solarlunar.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#ff6b9d;--primary-light:#ffb3cc;--primary-dark:#e8527f;
  --bg:#fff5f8;--card-bg:rgba(255,255,255,0.92);
  --text:#2d2d2d;--text-secondary:#888;
  --radius:16px;--radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,0.08);
  --theme-color:#ff6b9d;
}
html,body{height:100%;font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-tap-highlight-color:transparent}

.bg-decor{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.bg-decor .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:orbFloat 12s ease-in-out infinite}
.bg-decor .orb:nth-child(1){width:300px;height:300px;background:var(--theme-color);top:-80px;left:-60px}
.bg-decor .orb:nth-child(2){width:250px;height:250px;background:var(--theme-color);bottom:-50px;right:-40px;animation-delay:-4s;opacity:.25}
.bg-decor .orb:nth-child(3){width:200px;height:200px;background:var(--theme-color);top:40%;left:60%;animation-delay:-8s;opacity:.2}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,15px) scale(.95)}}

.app{position:relative;z-index:1;min-height:100%;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

.header{text-align:center;margin-bottom:24px;width:100%;max-width:480px}
.header h1{font-family:'ZCOOL KuaiLe',cursive;font-size:28px;color:var(--theme-color);margin-bottom:4px;transition:color .3s}
.header p{font-size:13px;color:var(--text-secondary)}

.card{width:100%;max-width:480px;background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,0.6);padding:28px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--theme-color);transition:background .3s}

.form-title{font-family:'ZCOOL KuaiLe',cursive;font-size:22px;text-align:center;margin-bottom:20px;color:var(--theme-color)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.form-group label .req{color:#ff4757;margin-left:2px}
.form-input{width:100%;height:44px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:0 14px;font-size:15px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:all .25s}
.form-input:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.form-input::placeholder{color:#bbb}
.birthday-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.birthday-trigger .arrow{font-size:12px;color:#999}

.theme-colors{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.theme-color-item{text-align:center}
.theme-dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .25s;position:relative}
.theme-dot:hover{transform:scale(1.15)}
.theme-dot.active{border-color:var(--text);transform:scale(1.15)}
.theme-dot.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.theme-label{font-size:10px;color:#999;margin-top:4px}

.blessing-area{position:relative}
.blessing-textarea{width:100%;min-height:80px;border:1.5px solid #e8e8e8;border-radius:var(--radius-sm);padding:12px 14px;font-size:14px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;resize:vertical;transition:all .25s;line-height:1.6}
.blessing-textarea:focus{border-color:var(--theme-color);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,0.1)}
.blessing-btns{display:flex;gap:8px;margin-top:6px}
.blessing-btns button{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:inherit}
.blessing-btns button:hover{border-color:var(--theme-color);color:var(--theme-color)}

/* Image upload area */
.img-section{margin-bottom:18px}
.img-section label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.img-actions{display:flex;gap:8px;margin-bottom:10px}
.img-actions button{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:inherit}
.img-actions button:hover{border-color:var(--theme-color);color:var(--theme-color)}
.img-actions button.active{background:var(--theme-color);color:#fff;border-color:var(--theme-color)}

.img-upload-zone{border:2px dashed #e0e0e0;border-radius:var(--radius-sm);padding:24px;text-align:center;cursor:pointer;transition:all .25s;background:#fafafa}
.img-upload-zone:hover{border-color:var(--theme-color);background:rgba(255,107,157,0.03)}
.img-upload-zone .upload-icon{font-size:32px;margin-bottom:6px}
.img-upload-zone .upload-text{font-size:14px;color:#999}
.img-upload-zone .upload-hint{font-size:11px;color:#bbb;margin-top:4px}

.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.img-item{width:calc(25% - 6px);aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative;cursor:grab;transition:all .2s;border:2px solid transparent;background:#f5f5f5}
.img-item:active{cursor:grabbing}
.img-item.dragging{opacity:.5;transform:scale(0.9)}
.img-item.drag-over{border-color:var(--theme-color);transform:scale(1.05)}
.img-item img{width:100%;height:100%;object-fit:cover;pointer-events:none}
.img-item .img-remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;border:none;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.img-item:hover .img-remove{opacity:1}
.img-item .img-num{position:absolute;bottom:4px;left:4px;width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.45);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center}
.img-add{width:calc(25% - 6px);aspect-ratio:1;border-radius:10px;border:2px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:#fafafa;font-size:24px;color:#ccc}
.img-add:hover{border-color:var(--theme-color);color:var(--theme-color)}
.img-add span{font-size:10px;color:#bbb;margin-top:2px}

.img-drag-tip{text-align:center;font-size:11px;color:#bbb;margin-top:6px}

/* Recommended images */
.recommended-grid{display:none;flex-wrap:wrap;gap:8px;margin-top:10px}
.recommended-grid.show{display:flex}
.recommended-item{width:calc(25% - 6px);aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative}
.recommended-item:hover{transform:scale(1.05);border-color:var(--theme-color)}
.recommended-item.selected{border-color:var(--theme-color)}
.recommended-item.selected::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.3);color:#fff;font-size:18px;font-weight:700}
.recommended-item img{width:100%;height:100%;object-fit:cover}

/* Advanced section */
.advanced-toggle{display:flex;align-items:center;justify-content:space-between;padding:12px 0;cursor:pointer;user-select:none;border-top:1px solid #f0f0f0;margin-top:4px}
.advanced-toggle span{font-size:14px;font-weight:500;color:#555}
.advanced-toggle .arrow-icon{font-size:12px;color:#999;transition:transform .3s}
.advanced-toggle.open .arrow-icon{transform:rotate(180deg)}
.advanced-content{max-height:0;overflow:hidden;transition:max-height .4s ease}
.advanced-content.open{max-height:800px}
.advanced-content .adv-item{margin-bottom:10px}
.advanced-content .adv-item label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.advanced-content .adv-item input{width:100%;height:36px;border:1.5px solid #e8e8e8;border-radius:8px;padding:0 10px;font-size:13px;font-family:inherit;background:#fafafa;color:var(--text);outline:none;transition:all .25s}
.advanced-content .adv-item input:focus{border-color:var(--theme-color);background:#fff}

.default-check{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:13px;color:#555;cursor:pointer}
.default-check input{accent-color:var(--theme-color);width:16px;height:16px}

.submit-btn{width:100%;height:50px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--theme-color),var(--theme-color));color:#fff;font-size:17px;font-family:'ZCOOL KuaiLe',cursive;cursor:pointer;letter-spacing:2px;transition:all .3s;box-shadow:0 4px 16px rgba(255,107,157,0.3);position:relative;overflow:hidden}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(255,107,157,0.4)}
.submit-btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(255,107,157,0.3)}
.submit-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.2) 50%,transparent 70%);transform:translateX(-100%);transition:none}
.submit-btn:hover::after{transform:translateX(100%);transition:transform .6s}

.result-section{margin-top:24px;display:none;text-align:center}
.result-section.show{display:block;animation:fadeUp .5s ease}
.result-tip{font-size:13px;color:var(--theme-color);margin-bottom:16px;line-height:1.6}
.result-card{width:100%;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);position:relative;background:#fff}
.result-card canvas{display:block;width:100%;height:auto}
.result-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.result-actions button{width:100%;height:46px;border:none;border-radius:var(--radius-sm);font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-download{background:var(--theme-color);color:#fff;box-shadow:0 4px 12px rgba(255,107,157,0.25)}
.btn-download:hover{opacity:.9;transform:translateY(-1px)}
.btn-copy{background:#fff;color:var(--theme-color);border:1.5px solid var(--theme-color)}
.btn-copy:hover{background:rgba(255,107,157,0.05)}
.qrcode-wrap{margin-top:20px;padding:20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);display:inline-block}
.qrcode-wrap p{font-size:13px;color:#999;margin-bottom:10px}
.qrcode-wrap canvas{display:block;margin:0 auto}
.qrcode-wrap .qr-tip{font-size:11px;color:#bbb;margin-top:8px}

/* Picker */
.picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.picker-overlay.show{display:flex;animation:fadeIn .2s ease}
.picker-panel{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px 0 0;animation:slideUp .3s ease}
.picker-header{display:flex;justify-content:space-between;align-items:center;padding:0 20px 16px;border-bottom:1px solid #f0f0f0}
.picker-header h3{font-size:16px;font-weight:500}
.picker-cancel,.picker-confirm{background:none;border:none;cursor:pointer;font-family:inherit;font-size:14px}
.picker-cancel{color:#999}.picker-confirm{color:var(--theme-color);font-weight:600}
.picker-body{display:flex;height:220px;position:relative;padding:0 10px}
.picker-body::before{content:'';position:absolute;left:10px;right:10px;top:88px;height:44px;border-top:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;background:rgba(255,255,157,0.04);z-index:2;pointer-events:none;border-radius:8px}
.picker-column{flex:1;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch}
.picker-column::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#999;scroll-snap-align:center;cursor:pointer;transition:all .15s;user-select:none}
.picker-sep{max-width:30px;flex:none;display:flex;align-items:center;justify-content:center}
.picker-sep span{color:#999;font-size:16px}
.picker-padding{height:88px}

/* History */
.history-btn{position:fixed;bottom:24px;left:20px;z-index:50;width:48px;height:48px;border-radius:50%;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,0.1);border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .25s}
.history-btn:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.history-panel{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:none;align-items:flex-end;justify-content:center}
.history-panel.show{display:flex;animation:fadeIn .2s ease}
.history-content{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;padding:20px;max-height:70vh;overflow-y:auto;animation:slideUp .3s ease}
.history-content h3{font-size:16px;font-weight:600;margin-bottom:4px}
.history-content .sub{font-size:12px;color:#999;margin-bottom:16px}
.history-item{display:flex;align-items:center;padding:12px;border-radius:var(--radius-sm);background:#fafafa;margin-bottom:8px;cursor:pointer;transition:all .2s}
.history-item:hover{background:#f0f0f0}
.history-item .info{flex:1;min-width:0}
.history-item .name{font-size:14px;font-weight:500}
.history-item .date{font-size:12px;color:#999}
.history-item .del-btn{width:32px;height:32px;border:none;background:none;color:#ccc;font-size:16px;cursor:pointer;border-radius:50%;transition:all .2s}
.history-item .del-btn:hover{background:#fee;color:#ff4757}
.history-empty{text-align:center;padding:30px;color:#ccc;font-size:14px}
.history-close{display:block;width:100%;height:44px;border:none;background:none;color:#999;font-size:14px;cursor:pointer;margin-top:12px;font-family:inherit}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,0.75);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;z-index:200;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

.footer{width:100%;max-width:480px;text-align:center;margin-top:32px;padding:20px 0;border-top:1px solid rgba(0,0,0,0.05)}
.footer .brand{font-family:'ZCOOL KuaiLe',cursive;font-size:18px;color:var(--theme-color);margin-bottom:8px}
.footer .desc{font-size:12px;color:#bbb;line-height:1.6;margin-bottom:16px}
.footer-copy{font-size:11px;color:#ccc}

/* ============================= */
/* ===== DISPLAY MODE ========== */
/* ============================= */
#displayMode{display:none;position:fixed;inset:0;z-index:1000;overflow:hidden}
#displayMode.show{display:flex;flex-direction:column}
#displayCanvas{position:absolute;inset:0;width:100%;height:100%}

.d-scroll{position:relative;z-index:3;flex:1;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.d-scroll::-webkit-scrollbar{display:none}

.d-phase{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;pointer-events:none;scroll-snap-align:start;position:relative}

.d-swipe-hint{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:13px;pointer-events:none;animation:swipeHint 2s ease-in-out infinite}
@keyframes swipeHint{0%,100%{opacity:.4;transform:translateX(-50%) translateY(0)}50%{opacity:.7;transform:translateX(-50%) translateY(-8px)}}

.d-phase-title{font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(22px,6vw,36px);color:#fff;text-shadow:0 3px 15px rgba(0,0,0,0.15);opacity:0;letter-spacing:3px;margin-bottom:12px}
.d-phase-img{max-width:85%;max-height:60vh;border-radius:16px;opacity:0;box-shadow:0 8px 40px rgba(0,0,0,0.25);object-fit:contain;transition:transform .3s ease}
.d-phase-text{font-size:clamp(16px,4vw,22px);color:rgba(255,255,255,0.95);line-height:1.8;max-width:500px;opacity:0;margin-top:16px;text-shadow:0 2px 10px rgba(0,0,0,0.15)}

.display-replay{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:auto;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:10px 28px;border-radius:24px;font-size:14px;font-family:inherit;cursor:pointer;transition:all .25s;opacity:0;display:none}
.display-replay.show{opacity:1;display:block}
.display-replay:hover{background:rgba(255,255,255,0.25)}
.display-music{position:absolute;top:20px;right:20px;z-index:10;pointer-events:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.display-music:hover{background:rgba(255,255,255,0.25)}
.display-music.playing{animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Animations */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(0.3)}70%{opacity:1;transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
@keyframes slideInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes textGlow{0%,100%{text-shadow:0 0 30px rgba(255,255,255,0.4),0 4px 20px rgba(0,0,0,0.15)}50%{text-shadow:0 0 60px rgba(255,255,255,0.6),0 4px 20px rgba(0,0,0,0.15)}}
@keyframes imgReveal{0%{opacity:0;transform:scale(0.85) translateY(40px)}50%{opacity:1;transform:scale(1.02) translateY(-8px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes cardFloat{0%{opacity:0;transform:translateY(60px) scale(0.9)}40%{opacity:1}70%{transform:translateY(-8px) scale(1.01)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes textSlideUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.15)}30%{transform:scale(1)}45%{transform:scale(1.1)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}

.d-img-card{
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:24px;padding:12px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.15);
  max-width:88vw;max-width:min(88vw,420px);
  opacity:0;position:relative;overflow:hidden;
}
.d-img-card::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.06),transparent 60%);
  pointer-events:none;
}
.d-img-card .card-img{
  width:100%;border-radius:16px;display:block;
  object-fit:cover;aspect-ratio:3/4;
  box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.d-img-card .card-text{
  text-align:center;padding:14px 8px 6px;
  font-family:'ZCOOL KuaiLe',cursive;font-size:clamp(15px,4vw,20px);
  color:rgba(255,255,255,0.95);letter-spacing:2px;
  text-shadow:0 2px 8px rgba(0,0,0,0.2);
  opacity:0;
}
.d-img-card .card-label{
  text-align:center;padding:4px 0 10px;
  font-size:clamp(11px,2.8vw,13px);
  color:rgba(255,255,255,0.5);letter-spacing:1px;
  opacity:0;
}
.d-img-card .card-heart{
  position:absolute;top:16px;right:16px;
  font-size:20px;opacity:0;
  animation:heartBeat 2s ease-in-out infinite;
  filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3));
}
.d-phase-img{display:none}
.d-img-placeholder{width:160px;height:160px;border-radius:16px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin:20px auto;font-size:64px;opacity:0.4}

/* ========== LUNAR HELPERS ========== */
const LUNAR_MONTH_CN=['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','腊月'];
const LUNAR_DAY_CN=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
function lunarDateText(m,d){return LUNAR_MONTH_CN[m-1]+LUNAR_DAY_CN[d-1]}
function todayLunar(){
  const now=new Date();
  if(typeof solarLunar!=='undefined'){
    const r=solarLunar.solar2lunar(now.getFullYear(),now.getMonth()+1,now.getDate());
    if(r!==-1)return{month:r.lMonth,day:r.lDay};
  }
  return{month:now.getMonth()+1,day:now.getDate()};
}

/* ========== TOKEN SYSTEM (Cloud + Local) ========== */
const CLOUD_API='https://jsonblob.com/api/jsonBlob';

function generateToken(){
  const chars='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  const seg=()=>Array.from({length:8},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  return seg()+'-'+seg()+'-'+seg();
}

// Save to cloud (primary) + localStorage (backup)
async function saveCardData(token,data){
  const payload={...data,token,createdAt:Date.now()};
  // Save to localStorage as backup
  try{
    const store=getCardStore();store[token]=payload;
    localStorage.setItem('bd_cards',JSON.stringify(store));
  }catch{cleanupOldCards();try{const store=getCardStore();store[token]=payload;localStorage.setItem('bd_cards',JSON.stringify(store))}catch{}}
  // Save to cloud
  try{
    const resp=await fetch(CLOUD_API,{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify(payload)});
    if(resp.ok){
      const blobId=resp.headers.get('Location')||resp.headers.get('location');
      if(blobId){
        const cloudMap=getCloudMap();cloudMap[token]=blobId.replace(/.*\//,'');
        localStorage.setItem('bd_cloud_map',JSON.stringify(cloudMap));
        return true;
      }
    }
    console.warn('Cloud save failed, local backup only');
    return true; // local backup still works
  }catch(e){
    console.warn('Cloud save error:',e);
    return true; // local backup still works
  }
}

// Get card data: try cloud first, fallback to localStorage
async function getCardData(token){
  // Try cloud
  const cloudMap=getCloudMap();
  const blobId=cloudMap[token];
  if(blobId){
    try{
      const resp=await fetch(CLOUD_API+'/'+blobId,{headers:{'Accept':'application/json'}});
      if(resp.ok){const data=await resp.json();return data}
    }catch{}
  }
  // Fallback: localStorage
  const store=getCardStore();
  return store[token]||null;
}

function getCardStore(){
  try{return JSON.parse(localStorage.getItem('bd_cards')||'{}')}catch{return{}}
}
function getCloudMap(){
  try{return JSON.parse(localStorage.getItem('bd_cloud_map')||'{}')}catch{return{}}
}
function deleteCardData(token){
  const store=getCardStore();delete store[token];
  localStorage.setItem('bd_cards',JSON.stringify(store));
  const cloudMap=getCloudMap();const blobId=cloudMap[token];
  if(blobId){
    delete cloudMap[token];localStorage.setItem('bd_cloud_map',JSON.stringify(cloudMap));
    fetch(CLOUD_API+'/'+blobId,{method:'DELETE'}).catch(()=>{});
  }
}
function cleanupOldCards(){
  const store=getCardStore();
  const entries=Object.entries(store).sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0));
  for(let i=0;i<3&&i<entries.length;i++)delete store[entries[i][0]];
  localStorage.setItem('bd_cards',JSON.stringify(store));
}

}
function selectTheme(i){

function getDaysInMonth(m){return[31,29,31,30,31,30,31,31,30,31,30,31][m-1]}
function buildPicker(){
  monthColumn.innerHTML='';dayColumn.innerHTML='';
  const mk=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
  monthColumn.appendChild(mk());
  for(let m=1;m<=12;m++){const d=document.createElement('div');d.className='picker-item';d.textContent=LUNAR_MONTH_CN[m-1];d.dataset.val=m;monthColumn.appendChild(d)}
  monthColumn.appendChild(mk());
  dayColumn.appendChild(mk());
  const dim=getDaysInMonth(pickerMonth);
  for(let d=1;d<=dim;d++){const e=document.createElement('div');e.className='picker-item';e.textContent=LUNAR_DAY_CN[d-1];e.dataset.val=d;dayColumn.appendChild(e)}
  dayColumn.appendChild(mk());
}
function scrollPicker(col,val){
  col.querySelectorAll('.picker-item').forEach(it=>{it.style.color='';it.style.fontWeight=''});
  const items=[...col.querySelectorAll('.picker-item')];
  const t=items.find(it=>it.dataset.val==val);
  if(t){col.scrollTop=t.offsetTop-88;t.style.color='var(--theme-color)';t.style.fontWeight='600'}
}
function readPickerCol(col){
  const items=[...col.querySelectorAll('.picker-item')];const target=col.scrollTop+88;
  let best=items[0],min=Infinity;items.forEach(it=>{const d=Math.abs(it.offsetTop-target);if(d<min){min=d;best=it}});
  return parseInt(best.dataset.val)||1;
}
let mT,dT;
function onPickerScroll(col,type){
  clearTimeout(type==='month'?mT:dT);
  const tm=setTimeout(()=>{
    const val=readPickerCol(col);
    if(type==='month'){
      pickerMonth=val;const oldDay=pickerDay;dayColumn.innerHTML='';
      const mk=()=>{const d=document.createElement('div');d.className='picker-padding';return d};
      dayColumn.appendChild(mk());const dim=getDaysInMonth(val);
      for(let d=1;d<=dim;d++){const e=document.createElement('div');e.className='picker-item';e.textContent=LUNAR_DAY_CN[d-1];e.dataset.val=d;dayColumn.appendChild(e)}
      dayColumn.appendChild(mk());pickerDay=Math.min(oldDay,dim);scrollPicker(dayColumn,pickerDay);
    }else{pickerDay=val}highlightPicker();
  },80);
  if(type==='month')mT=tm;else dT=tm;
}
function highlightPicker(){
  monthColumn.querySelectorAll('.picker-item').forEach(it=>{const a=parseInt(it.dataset.val)===pickerMonth;it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':''});
  dayColumn.querySelectorAll('.picker-item').forEach(it=>{const a=parseInt(it.dataset.val)===pickerDay;it.style.color=a?'var(--theme-color)':'';it.style.fontWeight=a?'600':''});
}
function openPicker(){
  pickerMonth=selectedMonth;pickerDay=selectedDay;buildPicker();pickerOverlay.classList.add('show');
  setTimeout(()=>{scrollPicker(monthColumn,pickerMonth);scrollPicker(dayColumn,pickerDay);monthColumn.onscroll=()=>onPickerScroll(monthColumn,'month');dayColumn.onscroll=()=>onPickerScroll(dayColumn,'day')},50);
}
function closePicker(){pickerOverlay.classList.remove('show');monthColumn.onscroll=null;dayColumn.onscroll=null}

birthdayTrigger.addEventListener('click',openPicker);

function handleFiles(files){
  const remain=8-uploadedImages.length;
  if(remain<=0){showToast('最多上传8张图片');return}
  const toProcess=Array.from(files).slice(0,remain);
  let loaded=0;
  toProcess.forEach(f=>{
    if(!f.type.startsWith('image/'))return;
    const reader=new FileReader();
    reader.onload=e=>{
      resizeImage(e.target.result,600,600,(resized)=>{
        uploadedImages.push(resized);
        loaded++;
        if(loaded>=toProcess.length)renderImgGrid();
      });
    };
    reader.readAsDataURL(f);
  });
}

function resizeImage(dataUrl,maxW,maxH,cb){
  const img=new Image();
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>maxW){h*=maxW/w;w=maxW}
    if(h>maxH){w*=maxH/h;h=maxH}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    cb(c.toDataURL('image/jpeg',0.85));
  };
  img.src=dataUrl;
}
function createThumbnail(src,maxDim,quality,cb){
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{
    let w=img.width,h=img.height;
    if(w>h){h*=maxDim/w;w=maxDim}else{w*=maxDim/h;h=maxDim}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    const full=c.toDataURL('image/jpeg',quality);
    cb(full.split(',')[1]);
  };
  img.onerror=()=>{cb('')};
  img.src=src;
}

/* Drag & drop reorder */
let dragIdx=null,dragOverIdx=null;
function setupDrag(){
  const items=imgGrid.querySelectorAll('.img-item');
  items.forEach(item=>{
    item.addEventListener('dragstart',e=>{
      dragIdx=parseInt(item.dataset.idx);
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
    });
    item.addEventListener('dragend',()=>{
      item.classList.remove('dragging');
      items.forEach(it=>it.classList.remove('drag-over'));
      dragIdx=null;dragOverIdx=null;
    });
    item.addEventListener('dragover',e=>{
      e.preventDefault();e.dataTransfer.dropEffect='move';
      const overIdx=parseInt(item.dataset.idx);
      if(overIdx!==dragOverIdx){
        items.forEach(it=>it.classList.remove('drag-over'));
        item.classList.add('drag-over');
        dragOverIdx=overIdx;
      }
    });
    item.addEventListener('drop',e=>{
      e.preventDefault();
      const toIdx=parseInt(item.dataset.idx);
      if(dragIdx!==null&&dragIdx!==toIdx){
        const moved=uploadedImages.splice(dragIdx,1)[0];
        uploadedImages.splice(toIdx,0,moved);
        renderImgGrid();
      }
    });
    // Touch drag for mobile
    let touchStartY=0,touchStartX=0,touchTimer=null,isDragging=false;
    item.addEventListener('touchstart',e=>{
      touchStartY=e.touches[0].clientY;touchStartX=e.touches[0].clientX;
      touchTimer=setTimeout(()=>{
        isDragging=true;dragIdx=parseInt(item.dataset.idx);
        item.classList.add('dragging');
      },400);
    },{passive:true});
    item.addEventListener('touchmove',e=>{
      if(!isDragging){clearTimeout(touchTimer);return}
      e.preventDefault();
      const touch=e.touches[0];
      const el=document.elementFromPoint(touch.clientX,touch.clientY);
      if(el){
        const overItem=el.closest('.img-item');
        items.forEach(it=>it.classList.remove('drag-over'));
        if(overItem&&overItem!==item){
          overItem.classList.add('drag-over');
          dragOverIdx=parseInt(overItem.dataset.idx);
        }
      }
    },{passive:false});
    item.addEventListener('touchend',()=>{
      clearTimeout(touchTimer);
      if(isDragging&&dragIdx!==null&&dragOverIdx!==null&&dragIdx!==dragOverIdx){
        const moved=uploadedImages.splice(dragIdx,1)[0];
        uploadedImages.splice(dragOverIdx,0,moved);
        renderImgGrid();
      }
      isDragging=false;dragIdx=null;dragOverIdx=null;
      items.forEach(it=>it.classList.remove('dragging','drag-over'));
    });
  });
}

/* ========== CARD GENERATION ========== */

let currentToken='';
function buildShareURL(){
  if(currentToken){
    return `${location.origin}${location.pathname}?card=${currentToken}`;
  }
  const n=encodeURIComponent(nameInput.value.trim()),s=encodeURIComponent(senderInput.value.trim()),b=encodeURIComponent(blessingInput.value.trim());
  return `${location.origin}${location.pathname}?name=${n}&sender=${s}&month=${selectedMonth}&day=${selectedDay}&theme=${currentTheme}&blessing=${b}`;
}
function buildShortURL(){return buildShareURL()}

function generateCard(){
  const name=nameInput.value.trim(),sender=senderInput.value.trim();
  if(!name){showToast('请输入寿星昵称');nameInput.focus();return}
  if(!sender){showToast('请输入发送人昵称');senderInput.focus();return}
  if(!uploadedImages.length){showToast('请至少上传或选择一张图片');return}

  // Generate a new token for this card
  currentToken=generateToken();

  const t=THEMES[currentTheme],blessing=blessingInput.value.trim()||BLESSINGS[blessingIndex%BLESSINGS.length];
  const useDefault=$('useDefaultText').checked;
  const texts=[];
  if(useDefault){
    for(let i=0;i<uploadedImages.length;i++) texts.push(DEFAULT_TEXTS[i%DEFAULT_TEXTS.length]);
    texts.push(DEFAULT_TEXTS[8]||'友谊长存！');
  }else{
    for(let i=0;i<8;i++){
      const el=$('blessing'+(i+1));
      texts.push(el&&el.value.trim()?el.value.trim():(i<uploadedImages.length?DEFAULT_TEXTS[i%DEFAULT_TEXTS.length]:''));
    }
    const el9=$('blessing9');
    texts.push(el9&&el9.value.trim()?el9.value.trim():'友谊长存！');
  }
  shareTexts=texts;

  // Generate thumbnails for URL sharing
  thumbnailData=[];
  let thumbsReady=0;
  const totalThumbs=uploadedImages.length;

  function proceedWithCanvas(){
    const canvas=cardCanvas,ctx=canvas.getContext('2d');
    const W=600;
    const imgCount=uploadedImages.length;
    const imgH=400;
    const textH=60;
    const headerH=160;
    const footerH=200;
    const H=headerH+imgCount*(imgH+textH)+footerH;
    canvas.width=W;canvas.height=H;

    // Background gradient
    const bg=ctx.createLinearGradient(0,0,W*0.5,H);
    bg.addColorStop(0,t.cg[0]+'dd');bg.addColorStop(0.5,t.cg[1]+'cc');bg.addColorStop(1,t.cg[2]+'ee');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    // Decorative circles
    for(let i=0;i<20;i++){ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,Math.random()*40+8,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.1+0.03})`;ctx.fill()}
    // Stars
    for(let i=0;i<30;i++){ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.4+0.2})`;drawStar(ctx,Math.random()*W,Math.random()*headerH,Math.random()*3+1)}

    // Header lines
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(40,50);ctx.lineTo(W-40,50);ctx.stroke();

    // Header text
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font='40px "ZCOOL KuaiLe",cursive';ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.12)';ctx.shadowBlur=12;ctx.shadowOffsetY=4;
    ctx.fillText('🎂 生日快乐！',W/2,95);ctx.shadowBlur=0;ctx.shadowOffsetY=0;
    ctx.font='28px "ZCOOL KuaiLe",cursive';ctx.fillStyle='#fff';ctx.fillText(`致：${name}`,W/2,140);

    // Draw images and texts
    let y=headerH;
    const imgPadding=40;
    const imgDrawW=W-imgPadding*2;

    let imagesLoaded=0;
    const totalImages=imgCount;
    const imgEls=[];

    function drawAfterImagesLoad(){
      for(let i=0;i<imgCount;i++){
        if(texts[i]){
          ctx.font='22px "ZCOOL KuaiLe",cursive';ctx.fillStyle='rgba(255,255,255,0.95)';
          ctx.shadowColor='rgba(0,0,0,0.1)';ctx.shadowBlur=6;ctx.shadowOffsetY=2;
          ctx.fillText(texts[i],W/2,y+30);ctx.shadowBlur=0;ctx.shadowOffsetY=0;
        }
        const img=imgEls[i];
        if(img){
          ctx.save();
          roundRect(ctx,imgPadding,y+50,imgDrawW,imgH-80,12);ctx.clip();
          const scale=Math.max(imgDrawW/img.width,(imgH-80)/img.height);
          const dw=img.width*scale,dh=img.height*scale;
          ctx.drawImage(img,imgPadding+(imgDrawW-dw)/2,y+50+(imgH-80-dh)/2,dw,dh);
          ctx.restore();
          ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
          roundRect(ctx,imgPadding,y+50,imgDrawW,imgH-80,12);ctx.stroke();
        }
        y+=imgH+textH;
      }
      if(texts[imgCount]){
        ctx.font='20px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.9)';
        ctx.fillText(texts[imgCount],W/2,y+20);
      }
      ctx.font='16px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.65)';
      ctx.fillText(`—— 来自 ${sender} 的祝福`,W/2,y+55);
      ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(40,y+80);ctx.lineTo(W-40,y+80);ctx.stroke();
      const shareURL=buildShareURL();
      drawQRCodeOnCanvas(ctx,shareURL,W,H,t,y+90);
      ctx.font='12px "Noto Sans SC",sans-serif';ctx.fillStyle='rgba(255,255,255,0.45)';
      ctx.fillText('Happy Everyday · 扫码打开给Ta惊喜 🎉',W/2,H-25);
      resultSection.classList.add('show');resultSection.scrollIntoView({behavior:'smooth',block:'start'});
      generateQRCode(shareURL);saveHistory(name,sender,selectedMonth,selectedDay,blessing,currentTheme,currentToken);
      // Save card data with token to cloud + local
      showToast('☁️ 正在保存到云端...');
      const lunarPassword=String(selectedMonth).padStart(2,'0')+String(selectedDay).padStart(2,'0');
      saveCardData(currentToken,{
        name,sender,month:selectedMonth,day:selectedDay,
        theme:currentTheme,blessing,
        images:uploadedImages,texts:shareTexts,
        token:currentToken,
        lunarPassword
      }).then(ok=>{
        if(ok)showToast('✅ 贺卡已保存，链接可分享给他人',2000);
        else{showToast('⚠️ 云端保存失败，仅本地可用',3000);currentToken=''}
      });
    }

    uploadedImages.forEach((src,i)=>{
      const img=new Image();img.crossOrigin='anonymous';
      img.onload=()=>{imgEls[i]=img;imagesLoaded++;if(imagesLoaded>=totalImages)drawAfterImagesLoad()};
      img.onerror=()=>{imgEls[i]=null;imagesLoaded++;if(imagesLoaded>=totalImages)drawAfterImagesLoad()};
      img.src=src;
    });
  }

  // Generate thumbnails first, then draw canvas
  uploadedImages.forEach((src,i)=>{
    createThumbnail(src,150,0.3,(b64)=>{
      thumbnailData[i]=b64||'';
      thumbsReady++;
      if(thumbsReady>=totalThumbs)proceedWithCanvas();
    });
  });
}

function drawQRCodeOnCanvas(ctx,url,W,H,t,qrY){
  try{
    const qr=qrcode(0,'L');qr.addData(url);qr.make();const sz=qr.getModuleCount(),cs=Math.floor(100/sz),qs=sz*cs,cx=W/2,cy=qrY+70;
  ctx.fillStyle='rgba(255,255,255,0.9)';roundRect(ctx,cx-qs/2-12,cy-qs/2-12,qs+24,qs+24,10);ctx.fill();
  for(let r=0;r<sz;r++)for(let c=0;c<sz;c++)if(qr.isDark(r,c)){ctx.fillStyle=t.cg[2];ctx.fillRect(cx-qs/2+c*cs,cy-qs/2+r*cs,cs,cs)}
  }catch(e){console.warn('QR generation failed:',e)}
}
function generateQRCode(url){
  const el=$('qrcodeEl');el.innerHTML='';
  try{
    const qr=qrcode(0,'M');qr.addData(url);qr.make();const sz=qr.getModuleCount(),cl=Math.max(4,Math.floor(200/sz));
  const c=document.createElement('canvas');c.width=sz*cl;c.height=sz*cl;const ctx=c.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
  for(let r=0;r<sz;r++)for(let co=0;co<sz;co++)if(qr.isDark(r,co)){ctx.fillStyle=THEMES[currentTheme].cg[1];ctx.fillRect(co*cl,r*cl,cl,cl)}
  const img=document.createElement('img');
  img.src=c.toDataURL('image/png');
  img.style.width='200px';img.style.height='200px';img.style.borderRadius='8px';
  el.appendChild(img);
  }catch(e){el.innerHTML='<p style="color:#999;font-size:12px">二维码生成失败（链接过长）</p>'}
}
function drawStar(ctx,x,y,r){ctx.beginPath();for(let i=0;i<5;i++){const a=Math.PI*2*i/5-Math.PI/2,ax=x+Math.cos(a)*r,ay=y+Math.sin(a)*r,b=a+Math.PI/5,bx=x+Math.cos(b)*r*0.4,by=y+Math.sin(b)*r*0.4;if(i===0)ctx.moveTo(ax,ay);else ctx.lineTo(ax,ay);ctx.lineTo(bx,by)}ctx.closePath();ctx.fill()}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath()}

        return;
      }
      displayData={name:tokenData.name||'',sender:tokenData.sender||'',
        month:tokenData.month||1,day:tokenData.day||1,
        themeIdx:tokenData.theme||0,blessing:tokenData.blessing||'生日快乐！',
        images:tokenData.images||[],texts:tokenData.texts||[]
      };
      // Password gate: require lunar date password
      if(tokenData.lunarPassword){
        showPasswordGate(tokenData.lunarPassword);
      }else{
        renderDisplay();
      }
    });
    return;
  }
  // Legacy URL mode (no token) — no password gate
  displayData={
    name:urlParams.get('name')||'',sender:urlParams.get('sender')||'',
    month:parseInt(urlParams.get('month'))||1,day:parseInt(urlParams.get('day'))||1,
    themeIdx:parseInt(urlParams.get('theme'))||0,blessing:urlParams.get('blessing')||'生日快乐！',
    images:(function(){
      const raw=urlParams.get('img');if(!raw)return[];
      try{
        const dec=typeof LZString!=='undefined'?LZString.decompressFromEncodedURIComponent(raw):decodeURIComponent(raw);
        if(!dec)return[];
        return dec.split('|').map(b64=>b64?'data:image/jpeg;base64,'+b64:'').filter(Boolean);
      }catch(e){return[]}
    })(),
    texts:(function(){
      const raw=urlParams.get('txt');if(!raw)return[];
      try{
        const dec=typeof LZString!=='undefined'?LZString.decompressFromEncodedURIComponent(raw):decodeURIComponent(raw);
        if(!dec)return[];
        return JSON.parse(dec);
      }catch(e){return[]}
    })()
  };
  renderDisplay();
}

function showPasswordGate(correctPassword){
  const gate=document.createElement('div');
  gate.id='passwordGate';
  gate.style.cssText='position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#ff6b9d 0%,#ff8fab 40%,#ffc2d4 100%);font-family:"Noto Sans SC",sans-serif;text-align:center;padding:24px';
  gate.innerHTML=`
    <div style="background:rgba(255,255,255,0.95);border-radius:24px;padding:40px 32px;max-width:360px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.15)">
      <div style="font-size:56px;margin-bottom:16px">🔐</div>
      <h2 style="font-size:20px;color:#2d2d2d;margin-bottom:8px;font-weight:700">请输入查看密码</h2>
      <p style="font-size:13px;color:#999;margin-bottom:24px">输入4位密码即可查看贺卡</p>
      <div style="display:flex;justify-content:center;gap:10px;margin-bottom:20px">
        <input type="text" maxlength="1" class="pwd-digit" style="width:52px;height:60px;border:2px solid #e8e8e8;border-radius:12px;text-align:center;font-size:28px;font-weight:700;color:#2d2d2d;background:#fafafa;outline:none;transition:border-color .2s" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" class="pwd-digit" style="width:52px;height:60px;border:2px solid #e8e8e8;border-radius:12px;text-align:center;font-size:28px;font-weight:700;color:#2d2d2d;background:#fafafa;outline:none;transition:border-color .2s" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" class="pwd-digit" style="width:52px;height:60px;border:2px solid #e8e8e8;border-radius:12px;text-align:center;font-size:28px;font-weight:700;color:#2d2d2d;background:#fafafa;outline:none;transition:border-color .2s" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" class="pwd-digit" style="width:52px;height:60px;border:2px solid #e8e8e8;border-radius:12px;text-align:center;font-size:28px;font-weight:700;color:#2d2d2d;background:#fafafa;outline:none;transition:border-color .2s" inputmode="numeric" pattern="[0-9]">
      </div>
      <button id="pwdSubmit" style="width:100%;height:48px;border:none;border-radius:12px;background:linear-gradient(135deg,#ff6b9d,#ff8fab);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(255,107,157,0.3)">确 定</button>
      <p id="pwdError" style="font-size:13px;color:#ff4757;margin-top:14px;min-height:20px;opacity:0;transition:opacity .3s"></p>
    </div>`;
  document.body.appendChild(gate);

  const digits=gate.querySelectorAll('.pwd-digit');
  const submitBtn=gate.querySelector('#pwdSubmit');
  const errorEl=gate.querySelector('#pwdError');

  digits.forEach((d,i)=>{
    d.addEventListener('input',()=>{
      d.value=d.value.replace(/\D/g,'');
      if(d.value&&i<3)digits[i+1].focus();
    });
    d.addEventListener('keydown',e=>{
      if(e.key==='Backspace'&&!d.value&&i>0){digits[i-1].focus();digits[i-1].value=''}
      if(e.key==='Enter')submitBtn.click();
    });
    d.addEventListener('focus',()=>{d.style.borderColor='#ff6b9d';d.style.background='#fff'});
    d.addEventListener('blur',()=>{d.style.borderColor='#e8e8e8';d.style.background='#fafafa'});
  });

  function checkPassword(){
    const entered=Array.from(digits).map(d=>d.value).join('');
    if(entered.length<4){errorEl.textContent='请输入4位密码';errorEl.style.opacity='1';return}
    if(entered===correctPassword){
      gate.style.transition='opacity .4s';gate.style.opacity='0';
      setTimeout(()=>{gate.remove();renderDisplay()},400);
    }else{
      errorEl.textContent='密码错误，请重新输入';errorEl.style.opacity='1';
      digits.forEach(d=>{d.style.borderColor='#ff4757';d.value=''});
      digits[0].focus();
      setTimeout(()=>{digits.forEach(d=>{d.style.borderColor='#e8e8e8'});errorEl.style.opacity='0'},1500);
    }
  }
  submitBtn.addEventListener('click',checkPassword);
  digits[0].focus();
}

function renderDisplay(){
  const t=THEMES[displayData.themeIdx]||THEMES[0];selectTheme(displayData.themeIdx);

  $('editMode').style.display='none';
  document.querySelector('.history-btn').style.display='none';
  document.querySelector('.bg-decor').style.display='none';
  $('displayMode').classList.add('show');

  // Build display phases dynamically
  const scroll=$('dScroll');scroll.innerHTML='';
  const phases=[];

  // Phase 1: Hi name
  const p1=document.createElement('div');p1.className='d-phase';
  p1.innerHTML=`<div class="d-phase-title" style="font-size:clamp(36px,10vw,72px);letter-spacing:4px">Hi</div><div class="d-phase-title" style="font-size:clamp(48px,14vw,100px);letter-spacing:6px;margin-top:10px">${displayData.name}</div><div class="d-swipe-hint">↑ 上滑继续 ↑</div>`;
  scroll.appendChild(p1);phases.push(p1);

  // Phase 2: 生日快乐
  const p2=document.createElement('div');p2.className='d-phase';
  p2.innerHTML=`<div class="d-phase-title" style="font-size:clamp(56px,16vw,120px);letter-spacing:12px">生日快乐</div><div class="d-swipe-hint">↑ 上滑继续 ↑</div>`;
  scroll.appendChild(p2);phases.push(p2);

  // Phase 3: Blessing
  const p3=document.createElement('div');p3.className='d-phase';
  p3.innerHTML=`<div class="d-phase-title">🎂 生日快乐！</div><div class="d-phase-title" style="font-size:clamp(22px,6vw,38px)">致：${displayData.name}</div><div class="d-phase-title" style="font-size:clamp(14px,3.5vw,20px);color:rgba(255,255,255,0.75)">${displayData.month}月${displayData.day}日</div><div style="width:60px;height:2px;background:rgba(255,255,255,0.3);margin:16px auto;opacity:0" class="p3-div"></div><div class="d-phase-text">${displayData.blessing}</div><div class="d-phase-text" style="font-size:clamp(13px,3vw,17px);color:rgba(255,255,255,0.6);margin-top:24px">—— 来自 ${displayData.sender} 的祝福</div><div class="d-swipe-hint">↑ 上滑继续 ↑</div>`;
  scroll.appendChild(p3);phases.push(p3);

  // Image phases - card style
  if(displayData.images&&displayData.images.length){
    displayData.images.forEach((src,i)=>{
      const pi=document.createElement('div');pi.className='d-phase';
      const txt=displayData.texts&&displayData.texts[i]?displayData.texts[i]:'';

      // Card container
      const card=document.createElement('div');card.className='d-img-card';

      // Heart decoration
      const heart=document.createElement('div');heart.className='card-heart';heart.textContent='💗';
      card.appendChild(heart);

      // Blessing text above image
      if(txt){
        const tEl=document.createElement('div');tEl.className='card-text';tEl.textContent=txt;
        card.appendChild(tEl);
      }

      // Image
      const imgEl=document.createElement('img');imgEl.className='card-img';imgEl.alt=`图片${i+1}`;
      imgEl.onerror=function(){this.style.display='none';const ph=document.createElement('div');ph.className='d-img-placeholder';ph.textContent='📷';card.appendChild(ph)};
      imgEl.src=src;card.appendChild(imgEl);

      // Label
      const label=document.createElement('div');label.className='card-label';
      label.textContent=`—— 来自 ${displayData.sender} 的祝福 · ${i+1}/${displayData.images.length}`;
      card.appendChild(label);

      pi.appendChild(card);
      scroll.appendChild(pi);phases.push(pi);
    });
  }

  $('displayReplay').classList.remove('show');$('displayReplay').style.display='none';

  // Canvas background
  const canvas=$('displayCanvas'),ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio||1,2);
  let W,H;
  function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}
  resize();window.addEventListener('resize',resize);

  // Sparkles
  const sparkles=[];
  class Sparkle{
    constructor(){this.reset()}
    reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.size=Math.random()*4+1;this.opacity=Math.random()*0.6+0.2;this.twinkle=Math.random()*Math.PI*2;this.twinkleSpeed=Math.random()*0.06+0.02;this.color=['#fff','#ffe4ec','#ffd1dc','#fff0f5','#fffacd','#ffe4e1'][Math.floor(Math.random()*6)];this.vy=Math.random()*0.3+0.1;this.vx=(Math.random()-0.5)*0.3}
    update(){this.y+=this.vy;this.x+=this.vx;this.twinkle+=this.twinkleSpeed;this.opacity=0.2+Math.sin(this.twinkle)*0.4;if(this.y>H+10||this.x<-10||this.x>W+10){this.reset();this.y=-10}}
    draw(ctx){ctx.save();ctx.globalAlpha=Math.max(0,this.opacity);ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size*0.6,0,Math.PI*2);ctx.fill();ctx.restore()}
  }
  for(let i=0;i<60;i++)sparkles.push(new Sparkle());

  // Phase scroll detection
  let currentPhase=0;
  const phaseAnimated={};

  function animatePhase(num){
    if(phaseAnimated[num])return;
    phaseAnimated[num]=true;
    const phase=phases[num-1];
    if(!phase)return;

    // Card-style image phase
    const card=phase.querySelector('.d-img-card');
    if(card){
      card.style.animation='cardFloat 0.9s cubic-bezier(0.34,1.56,0.64,1) forwards';
      const heart=card.querySelector('.card-heart');
      if(heart)setTimeout(()=>{heart.style.opacity='1'},600);
      const cardText=card.querySelector('.card-text');
      if(cardText)setTimeout(()=>{cardText.style.animation='textSlideUp 0.6s ease forwards'},300);
      const cardImg=card.querySelector('.card-img');
      if(cardImg)setTimeout(()=>{cardImg.style.animation='imgReveal 0.7s ease forwards'},400);
      const cardLabel=card.querySelector('.card-label');
      if(cardLabel)setTimeout(()=>{cardLabel.style.animation='textSlideUp 0.5s ease forwards'},700);
    }else{
      // Original phases (Hi, 生日快乐, Blessing)
      const els=phase.querySelectorAll('.d-phase-title,.d-phase-text,.p3-div');
      els.forEach((el,i)=>{
        setTimeout(()=>{el.style.cssText+=`;animation:popIn 0.7s ease forwards`},(i+1)*250);
      });
    }

    if(num===phases.length){
      setTimeout(()=>{
        $('displayReplay').style.display='block';
        setTimeout(()=>$('displayReplay').classList.add('show'),100);
      },1500);
    }
  }

  scroll.addEventListener('scroll',()=>{
    const scrollY=scroll.scrollTop;
    const phaseH=window.innerHeight;
    const newPhase=Math.round(scrollY/phaseH)+1;
    if(newPhase!==currentPhase&&newPhase>=1&&newPhase<=phases.length){
      currentPhase=newPhase;animatePhase(newPhase);
    }
  },{passive:true});

  scroll.scrollTop=0;currentPhase=1;
  setTimeout(()=>animatePhase(1),300);

  // Animation loop
  function animate(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createLinearGradient(0,0,W*0.3,H);
    bg.addColorStop(0,t.cg[2]+'ee');bg.addColorStop(0.5,t.cg[1]+'dd');bg.addColorStop(1,t.cg[0]+'cc');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const glow=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
    glow.addColorStop(0,'rgba(255,255,255,0.08)');glow.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    for(const s of sparkles){s.update();s.draw(ctx)}
    displayAnim=requestAnimationFrame(animate);
  }

  function tryAutoPlay(){startMusicLoop();document.removeEventListener('click',tryAutoPlay);document.removeEventListener('touchstart',tryAutoPlay)}
  if(!startMusicLoop()){document.addEventListener('click',tryAutoPlay,{once:true});document.addEventListener('touchstart',tryAutoPlay,{once:true})}
  animate();
}

$('displayReplay').addEventListener('click',()=>{
  if(displayAnim)cancelAnimationFrame(displayAnim);stopMusicLoop();
  const se=$('dScroll');if(se)se.scrollTop=0;startDisplayMode();
});

// Music
const NOTES=[262,262,294,262,349,330,262,262,294,262,392,349,262,262,523,440,349,330,294,466,466,440,349,392,349];
const DURS=[0.3,0.15,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.45,0.9,0.3,0.15,0.45,0.45,0.45,0.9];
let musicLoopTimer=null;
function getTotalDuration(){let t=0;DURS.forEach(d=>t+=d);return t}
const TOTAL_DUR=getTotalDuration();

function playOneCycle(){
  if(!musicPlaying||!audioCtx)return;if(audioCtx.state==='suspended'){audioCtx.resume()}
  let time=audioCtx.currentTime+0.1;
  NOTES.forEach((freq,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0.12,time);g.gain.exponentialRampToValueAtTime(0.01,time+DURS[i]*0.9);
    o.connect(g);g.connect(audioCtx.destination);o.start(time);o.stop(time+DURS[i]);time+=DURS[i];
  });
  musicLoopTimer=setTimeout(()=>{if(musicPlaying)playOneCycle()},TOTAL_DUR*1000+200);
}
function startMusicLoop(){
  if(musicPlaying)return false;
  try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();musicPlaying=true;$('displayMusic').classList.add('playing');playOneCycle();return true}catch{return false}
}
function stopMusicLoop(){musicPlaying=false;clearTimeout(musicLoopTimer);if(audioCtx){try{audioCtx.close()}catch{};audioCtx=null}$('displayMusic').classList.remove('playing')}
$('displayMusic').addEventListener('click',function(e){e.stopPropagation();if(musicPlaying)stopMusicLoop();else startMusicLoop()});

/* ===== INIT ===== */
// Valid access tokens (add/remove tokens here to control access)
const VALID_TOKENS=['birthday2026','happy612','crayonshinchan'];

if(isDisplayMode){startDisplayMode()}
else{
  // Editor mode
  if(tokenParam){
    // Token authorization gate
    if(!VALID_TOKENS.includes(tokenParam)){
      document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#ff6b9d,#ff8fab);color:#fff;font-family:sans-serif;text-align:center;padding:40px"><div><div style="font-size:64px;margin-bottom:20px">🔒</div><h2 style="font-size:24px;margin-bottom:12px">授权凭证无效</h2><p style="opacity:0.8;font-size:14px">请联系管理员获取有效链接</p></div></div>';
      throw new Error('Invalid token');
    }
  }
  initThemes();selectTheme(0);
  const tl=todayLunar();selectedMonth=tl.month;selectedDay=tl.day;
  pickerMonth=selectedMonth;pickerDay=selectedDay;
  birthdayDisplay.textContent=lunarDateText(selectedMonth,selectedDay);
  birthdayDisplay.style.color='var(--text)';
  renderImgGrid();
}

})();
